<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" role="img" aria-labelledby="title desc">
  <title id="title">Pachi EV Analyzer store ranking screenshot preview</title>
  <desc id="desc">Store performance ranking preview with top and bottom performers.</desc>
  <rect width="1280" height="800" fill="#f7f8f5"/>
  <rect x="80" y="70" width="1120" height="660" rx="18" fill="#ffffff" stroke="#d9dfd7"/>
  <text x="128" y="138" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="#17211d">Store Performance Ranking</text>
  <text x="128" y="178" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#69746f">Compare stores by total profit, average profit, win rate, and session count</text>
  <g transform="translate(128 240)">
    <rect width="312" height="360" rx="14" fill="#eef7f4" stroke="#9accc3"/>
    <text x="28" y="54" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#115e59">🥇 駅前ホール</text>
    <text x="28" y="118" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="#115e59">+84,000円</text>
    <text x="28" y="176" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#69746f">Win rate 66.7%</text>
    <text x="28" y="222" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#69746f">Sessions 6</text>
  </g>
  <g transform="translate(484 240)">
    <rect width="312" height="360" rx="14" fill="#f5f7f4" stroke="#d9dfd7"/>
    <text x="28" y="54" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#17211d">🥈 中央ホール</text>
    <text x="28" y="118" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="#115e59">+39,000円</text>
    <text x="28" y="176" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#69746f">Win rate 50.0%</text>
    <text x="28" y="222" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#69746f">Sessions 4</text>
  </g>
  <g transform="translate(840 240)">
    <rect width="312" height="360" rx="14" fill="#fff1f3" stroke="#f0b8c4"/>
    <text x="28" y="54" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#17211d">🥉 郊外ホール</text>
    <text x="28" y="118" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="#be123c">-18,000円</text>
    <text x="28" y="176" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#69746f">Win rate 33.3%</text>
    <text x="28" y="222" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#69746f">Sessions 3</text>
  </g>
</svg>

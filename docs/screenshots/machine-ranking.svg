<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" role="img" aria-labelledby="title desc">
  <title id="title">Pachi EV Analyzer machine ranking screenshot preview</title>
  <desc id="desc">Machine performance ranking preview with top and bottom performers.</desc>
  <rect width="1280" height="800" fill="#f7f8f5"/>
  <rect x="80" y="70" width="1120" height="660" rx="18" fill="#ffffff" stroke="#d9dfd7"/>
  <text x="128" y="138" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="#17211d">Machine Performance Ranking</text>
  <text x="128" y="178" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#69746f">Top 5 and Bottom 5 by total profit, average profit, win rate, and sessions</text>
  <g transform="translate(128 235)">
    <rect width="480" height="420" rx="14" fill="#f5f7f4" stroke="#d9dfd7"/>
    <text x="28" y="48" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#115e59">Top 5</text>
    <text x="32" y="112" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#17211d">🥇 エヴァ未来</text>
    <text x="300" y="112" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#115e59">+76,000円</text>
    <text x="32" y="182" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#17211d">🥈 海物語ブラック</text>
    <text x="300" y="182" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#115e59">+62,000円</text>
    <text x="32" y="252" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#17211d">🥉 ジャグラーEX</text>
    <text x="300" y="252" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#115e59">+12,500円</text>
  </g>
  <g transform="translate(672 235)">
    <rect width="480" height="420" rx="14" fill="#fff1f3" stroke="#f0b8c4"/>
    <text x="28" y="48" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#be123c">Bottom 5</text>
    <text x="32" y="112" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#17211d">🥇 北斗スマスロ</text>
    <text x="300" y="112" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#be123c">-52,000円</text>
    <text x="32" y="182" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#17211d">🥈 からくりサーカス</text>
    <text x="300" y="182" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#be123c">-29,000円</text>
    <text x="32" y="252" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#17211d">🥉 その他</text>
    <text x="300" y="252" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#be123c">-8,000円</text>
  </g>
</svg>

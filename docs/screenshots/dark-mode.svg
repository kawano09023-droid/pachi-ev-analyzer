    <text x="24" y="92" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="#fb7185">-45,000円</text>
  </g>
  <rect x="104" y="414" width="1084" height="248" rx="10" fill="#202b26" stroke="#2f3d37"/>
  <text x="136" y="466" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#edf5f1">Readable charts in dark mode</text>
  <line x1="136" y1="628" x2="1148" y2="628" stroke="#31423b" stroke-width="2"/>
  <polyline points="150,600 280,552 410,584 540,508 670,540 800,470 930,514 1060,438" fill="none" stroke="#2dd4bf" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
